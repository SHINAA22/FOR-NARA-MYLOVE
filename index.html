<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://raw.githubusercontent.com/sojijr/valentine-website/main/public/images/favicon.png">
    <link rel="icon" href="public/images/favicon.png" type="image/x-icon" />  
    <title>KE SAYANGKU 💖</title>
    <link rel="stylesheet" href="public/style.css">
  </head>
  <body>
    <canvas id="starfield"></canvas>
<audio id="bgMusic" src="public/song.mp3" loop autoplay></audio>
    <div id="love-container" style="display: none; text-align: center; position: absolute; top: calc(50% + 120px); left: 50%; transform: translateX(-50%); z-index: 999;">
        <div id="emoji-display" style="font-size: 50px; margin-bottom: 15px; animation: bounce 1s infinite alternate;">🥰</div>
        <div style="display: flex; gap: 20px; justify-content: center; align-items: center;">
            <button id="btn-love" style="background-color: #ff4b5c; color: white; border: none; padding: 12px 28px; font-size: 18px; border-radius: 20px; cursor: pointer; transition: 0.2s;">Cinta</button>
            <button id="btn-notlove" style="background-color: #888; color: white; border: none; padding: 12px 28px; font-size: 18px; border-radius: 20px; cursor: pointer; transition: all 0.2s ease;">Tidak mencintai</button>
        </div>
    </div>
    <button id="valentinesButton">Click Aku!! 💙</button>

    <script src="script.js"></script>  <!-- ✅ ย้ายมาไว้ตรงนี้ -->
  </body>
</html>
